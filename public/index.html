<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swish — قبعات ستريت وير | الدفع عند الاستلام</title>
  <meta name="description" content="Swish — قبعات ستريت وير أمريكية بستايل هيب هوب. اختر موديلك واطلب الآن، الدفع عند الاستلام، توصيل لكل الولايات." />
  <meta name="theme-color" content="#0a0a0b" />
  <meta property="og:title" content="Swish — Streetwear Caps" />
  <meta property="og:description" content="قبعات ستريت وير — الدفع عند الاستلام" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230a0a0b'/><text x='50' y='62' font-family='Arial Black,sans-serif' font-size='46' font-weight='900' fill='%23fff' text-anchor='middle'>S</text></svg>" />
</head>
<body>
  <!-- ===== مكتبة الأيقونات SVG (sprite) ===== -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <symbol id="i-swoosh" viewBox="0 0 64 24"><path d="M2 18C14 6 30 4 62 2 40 6 24 12 8 22c10-3 22-5 40-6-16 4-30 6-46 2z" fill="currentColor"/></symbol>
    <symbol id="i-chev-l" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></symbol>
    <symbol id="i-chev-r" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></symbol>
    <symbol id="i-chev-d" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></symbol>
    <symbol id="i-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.5 7-11a7 7 0 10-14 0c0 5.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></symbol>
    <symbol id="i-truck" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4h13v11H1zM14 8h4l3 3v4h-7"/><circle cx="6" cy="18" r="1.8"/><circle cx="18" cy="18" r="1.8"/></symbol>
    <symbol id="i-cash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/><path d="M5 9.5v5M19 9.5v5"/></symbol>
    <symbol id="i-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 3v6c0 5-3.5 8.5-8 11-4.5-2.5-8-6-8-11V5z"/><path d="M9 12l2 2 4-4"/></symbol>
    <symbol id="i-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 018 0v3"/></symbol>
    <symbol id="i-minus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14"/></symbol>
    <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></symbol>
    <symbol id="i-star" viewBox="0 0 24 24"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 17.8 5.9 20.6l1.4-6.8L2.2 9.1l6.9-.8z" fill="currentColor"/></symbol>
    <symbol id="i-bag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6 7h12l-1 13H7zM9 7a3 3 0 016 0"/></symbol>
    <symbol id="i-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h4l2 5-3 2a12 12 0 006 6l2-3 5 2v4a2 2 0 01-2 2A17 17 0 013 5a2 2 0 012-2z"/></symbol>
  </svg>

  <div class="bg-fx" aria-hidden="true"><span class="blob b1"></span><span class="blob b2"></span></div>

  <!-- ===== الهيدر ===== -->
  <header class="topbar">
    <a href="#" class="logo" aria-label="Swish">
      <span class="logo-word">swish</span>
      <svg class="logo-swoosh" aria-hidden="true"><use href="#i-swoosh"/></svg>
    </a>
  </header>

  <main class="stage">
    <p class="kicker" id="kicker">قبعات ستريت وير أصلية — اطلب الآن، ادفع عند الاستلام</p>

    <div class="grid">
      <!-- ===== الكاروسيل ===== -->
      <section class="glass carousel" id="carousel" aria-label="تشكيلة القبعات">
        <div class="car-viewport" id="carViewport">
          <div class="car-track" id="carTrack"><!-- slides injected --></div>
        </div>
        <button class="car-nav prev" id="carPrev" aria-label="السابق"><svg aria-hidden="true"><use href="#i-chev-r"/></svg></button>
        <button class="car-nav next" id="carNext" aria-label="التالي"><svg aria-hidden="true"><use href="#i-chev-l"/></svg></button>
        <div class="car-dots" id="carDots"></div>
      </section>

      <!-- ===== الفورم ===== -->
      <section class="glass order">
        <form id="orderForm" novalidate>
          <!-- الموديل المختار -->
          <div class="picked" id="picked">
            <div class="picked-thumb"><img id="pkImg" alt="" /></div>
            <div class="picked-info">
              <div class="picked-label">موديلك المختار</div>
              <div class="picked-name" id="pkName">—</div>
              <div class="picked-price"><span id="pkNow">0</span> <span class="cur" id="pkCur">دج</span><span class="picked-old" id="pkOld"></span></div>
            </div>
          </div>

          <div class="fld" id="colorFld" style="display:none">
            <label>اللون</label>
            <div class="cs" id="colorCs"></div>
            <input type="hidden" id="fColor" name="color" />
          </div>

          <div class="fld">
            <label for="fName">الاسم الكامل <i>*</i></label>
            <input type="text" id="fName" name="fullName" autocomplete="name" placeholder="الاسم واللقب" required />
            <small class="err" id="errName"></small>
          </div>

          <div class="fld">
            <label for="fPhone">رقم الهاتف <i>*</i></label>
            <input type="tel" id="fPhone" name="phone" dir="ltr" autocomplete="tel" inputmode="numeric" placeholder="06 / 05 / 07 XX XX XX XX" required />
            <small class="err" id="errPhone"></small>
          </div>

          <div class="fld">
            <label>الولاية <i>*</i></label>
            <div class="cs" id="wilayaCs"></div>
            <input type="hidden" id="fWilaya" name="wilaya" />
            <small class="err" id="errWilaya"></small>
          </div>

          <div class="fld">
            <label>طريقة التوصيل</label>
            <div class="deliv">
              <label class="dv"><input type="radio" name="deliveryType" value="home" checked /><span><b>إلى المنزل</b><small id="pHome">—</small></span></label>
              <label class="dv"><input type="radio" name="deliveryType" value="desk" /><span><b>مكتب التوصيل</b><small id="pDesk">—</small></span></label>
            </div>
          </div>

          <div class="fld" id="addrFld">
            <label for="fAddress">العنوان / البلدية <i>*</i></label>
            <input type="text" id="fAddress" name="address" autocomplete="street-address" placeholder="البلدية والعنوان" />
            <small class="err" id="errAddress"></small>
          </div>

          <div class="fld qtyfld">
            <label>الكمية</label>
            <div class="qty">
              <button type="button" id="qMinus" aria-label="إنقاص"><svg aria-hidden="true"><use href="#i-minus"/></svg></button>
              <input type="number" id="fQty" name="quantity" value="1" min="1" max="99" />
              <button type="button" id="qPlus" aria-label="زيادة"><svg aria-hidden="true"><use href="#i-plus"/></svg></button>
            </div>
          </div>

          <!-- الملخص -->
          <div class="totals">
            <div class="t-row"><span>المجموع الفرعي</span><span><span id="tSub">0</span> <span class="cur"></span></span></div>
            <div class="t-row t-save" id="tSaveRow" hidden><span>وفّرت</span><span id="tSave">0</span></div>
            <div class="t-row"><span>التوصيل</span><span id="tDeliv">—</span></div>
            <div class="t-row t-total"><span>الإجمالي</span><span><span id="tTotal">0</span> <span class="cur"></span></span></div>
          </div>

          <div class="err form-err" id="formErr" hidden></div>

          <button type="submit" class="cta" id="submitBtn">
            <svg class="ic" aria-hidden="true"><use href="#i-bag"/></svg>
            <span>تأكيد الطلب — الدفع عند الاستلام</span>
          </button>

          <!-- ثقة -->
          <div class="trust">
            <span><svg aria-hidden="true"><use href="#i-cash"/></svg> دفع عند الاستلام</span>
            <span><svg aria-hidden="true"><use href="#i-truck"/></svg> توصيل 58 ولاية</span>
            <span><svg aria-hidden="true"><use href="#i-shield"/></svg> جودة مضمونة</span>
          </div>
          <p class="secure"><svg aria-hidden="true"><use href="#i-lock"/></svg> معلوماتك آمنة — نتصل بك لتأكيد الطلب</p>
        </form>
      </section>
    </div>
  </main>

  <footer class="foot"><span class="logo-word sm">swish</span> © <span id="year"></span></footer>

  <!-- نافذة النجاح -->
  <div class="modal" id="okModal" role="dialog" aria-modal="true" aria-labelledby="okTitle" hidden>
    <div class="glass modal-box">
      <div class="ok-check"><svg aria-hidden="true"><use href="#i-check"/></svg></div>
      <h3 id="okTitle">تم استلام طلبك</h3>
      <p>رقم الطلب: <strong id="okRef"></strong></p>
      <p class="muted">سنتصل بك قريبًا لتأكيد الطلب وتفاصيل التوصيل.</p>
      <button class="cta" id="okClose">تمام</button>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
