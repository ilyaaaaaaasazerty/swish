<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الطلبات | لوحة التحكم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body data-page="orders">
  <div class="sb-backdrop" id="sbBackdrop"></div>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sb-logo"><span>Swish</span></div>
      <nav class="sb-nav">
        <a href="/admin/dashboard.html"><span class="ic">📊</span> لوحة المعلومات</a>
        <a href="/admin/orders.html" class="active"><span class="ic">📦</span> الطلبات</a>
        <a href="/admin/products.html"><span class="ic">🧢</span> المنتجات</a>
        <a href="/admin/settings.html"><span class="ic">⚙️</span> الإعدادات</a>
      </nav>
      <div class="sb-foot">
        <a href="/" target="_blank" class="sb-view">👁️ عرض المتجر</a>
        <button class="btn-logout" id="logoutBtn">تسجيل الخروج</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="menu-toggle" id="menuToggle">☰</button>
          <div><h1>الطلبات</h1><div class="sub">تتبّع الطلبات وغيّر حالتها</div></div>
        </div>
        <button class="btn btn-ghost" id="refreshBtn">🔄 تحديث</button>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="status-tabs" id="statusTabs"></div>
          <div class="filters">
            <input type="search" id="searchInput" placeholder="🔍 بحث بالاسم/الهاتف/المرجع" />
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>المرجع</th><th>التاريخ</th><th>العميل</th><th>الهاتف</th><th>المنتج</th><th>الولاية</th><th>المجموع</th><th>الحالة</th><th>إجراءات</th></tr></thead>
            <tbody id="ordersBody"><tr><td colspan="9" class="spinner">جاري التحميل...</td></tr></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- مودال تفاصيل الطلب -->
  <div class="modal" id="orderModal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="omTitle">تفاصيل الطلب</h3>
        <button class="modal-x" data-close>✕</button>
      </div>
      <div class="modal-body" id="orderDetail"></div>
      <div class="modal-foot">
        <div class="fg" style="flex:1">
          <label>تغيير الحالة</label>
          <select id="statusSelect"></select>
        </div>
        <button class="btn btn-brand" id="saveStatus" style="align-self:flex-end">حفظ الحالة</button>
        <button class="btn btn-danger" id="deleteOrder" style="align-self:flex-end">حذف</button>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>
  <script src="/admin/js/admin.js"></script>
</body>
</html>
