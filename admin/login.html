<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول | لوحة التحكم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body data-page="login">
  <div class="login-wrap">
    <form class="login-card" id="loginForm">
      <div class="login-logo">🧢 لوحة التحكم</div>
      <div class="login-sub">سجّل الدخول لإدارة المتجر والطلبات</div>
      <div class="login-err" id="loginErr" hidden></div>
      <div class="fg" style="margin-bottom:14px">
        <label>اسم المستخدم</label>
        <input type="text" id="username" autocomplete="username" required />
      </div>
      <div class="fg" style="margin-bottom:20px">
        <label>كلمة المرور</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-brand" style="width:100%" id="loginBtn">دخول</button>
    </form>
  </div>
  <div class="toast-wrap" id="toastWrap"></div>
  <script src="/admin/js/admin.js"></script>
</body>
</html>
